services:
  cron:
    container_name: quant-signal-cron
    build:
      context: .
      dockerfile: Dockerfile.cron
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      STATE_FILE: /data/last-signal.json
      SNAPSHOT_FILE: /data/dashboard-snapshot.json
    volumes:
      - signal-state:/data

  web:
    container_name: quant-dashboard
    build:
      context: .
      dockerfile: Dockerfile
    image: quant-dashboard:latest
    restart: unless-stopped
    init: true
    ports:
      - "${HOST_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      SNAPSHOT_FILE: /data/dashboard-snapshot.json
    volumes:
      - signal-state:/data:ro
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  signal-state:
